<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup | Expense Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

.card{
    width:100%;
    max-width:450px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:40px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

.logo{
    text-align:center;
    font-size:32px;
    font-weight:700;
    color:white;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    color:#cbd5e1;
    margin-bottom:8px;
    font-size:14px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#94a3b8;
}

input:focus{
    outline:none;
    border:1px solid #3b82f6;
}

.btn-signup{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

.btn-signup:hover{
    transform:translateY(-3px);
}

.error{
    background:#ef4444;
    color:white;
    padding:12px;
    border-radius:10px;
    text-align:center;
    margin-bottom:20px;
}

.footer-text{
    text-align:center;
    margin-top:25px;
    color:#cbd5e1;
}

.footer-text a{
    color:#60a5fa;
    text-decoration:none;
    font-weight:600;
}

.footer-text a:hover{
    text-decoration:underline;
}

</style>
</head>

<body>

<div class="card">

    <div class="logo">💰 Expense Tracker</div>
    <div class="subtitle">Create Your Account</div>

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <form action="/signup" method="POST">

        <div class="form-group">
            <label>Full Name</label>
            <input
                type="text"
                name="name"
                placeholder="Enter your full name"
                required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input
                type="email"
                name="email"
                placeholder="example@gmail.com"
                required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input
                type="password"
                name="password"
                placeholder="Create password"
                required>
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input
                type="password"
                name="confirm_password"
                placeholder="Confirm password"
                required>
        </div>

        <button type="submit" class="btn-signup">
            Create Account
        </button>

    </form>

    <div class="footer-text">
        Already have an account?
        <a href="/login">Login</a>
    </div>

</div>

</body>
</html>
