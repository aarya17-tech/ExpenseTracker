<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Expense | Expense Tracker</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
    padding:20px;
}

.card{
    width:100%;
    max-width:550px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:25px;
    padding:35px;
    box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    color:white;
    margin-bottom:30px;
    font-size:2rem;
}

.form-group{
    margin-bottom:20px;
}

label{
    display:block;
    color:#cbd5e1;
    margin-bottom:8px;
    font-size:14px;
}

input,
select,
textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:rgba(255,255,255,0.1);
    color:white;
    font-size:15px;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border:1px solid #3b82f6;
}

input::placeholder,
textarea::placeholder{
    color:#94a3b8;
}

select option{
    color:black;
}

.btn-submit{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#3b82f6,#8b5cf6);
    color:white;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

.btn-submit:hover{
    transform:translateY(-3px);
}

.back-link{
    display:block;
    text-align:center;
    margin-top:20px;
    color:#cbd5e1;
    text-decoration:none;
}

.back-link:hover{
    color:white;
}

</style>
</head>

<body>

<div class="card">

    <h2>✏️ Edit Expense</h2>

    <form action="/update/{{ expense.id }}" method="POST">

        <div class="form-group">
            <label>Expense Title</label>
            <input
                type="text"
                name="title"
                value="{{ expense.title }}"
                required>
        </div>

        <div class="form-group">
            <label>Amount (₹)</label>
            <input
                type="number"
                name="amount"
                value="{{ expense.amount }}"
                required>
        </div>

        <div class="form-group">
            <label>Category</label>

            <select name="category" required>

                <option value="Food"
                {% if expense.category == 'Food' %}selected{% endif %}>
                Food
                </option>

                <option value="Travel"
                {% if expense.category == 'Travel' %}selected{% endif %}>
                Travel
                </option>

                <option value="Shopping"
                {% if expense.category == 'Shopping' %}selected{% endif %}>
                Shopping
                </option>

                <option value="Bills"
                {% if expense.category == 'Bills' %}selected{% endif %}>
                Bills
                </option>

                <option value="Entertainment"
                {% if expense.category == 'Entertainment' %}selected{% endif %}>
                Entertainment
                </option>

                <option value="Education"
                {% if expense.category == 'Education' %}selected{% endif %}>
                Education
                </option>

                <option value="Healthcare"
                {% if expense.category == 'Healthcare' %}selected{% endif %}>
                Healthcare
                </option>

                <option value="Others"
                {% if expense.category == 'Others' %}selected{% endif %}>
                Others
                </option>

            </select>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input
                type="date"
                name="date"
                value="{{ expense.date }}"
                required>
        </div>

        <div class="form-group">
            <label>Description</label>
            <textarea
                name="description"
                rows="4">{{ expense.description }}</textarea>
        </div>

        <button type="submit" class="btn-submit">
            Save Changes
        </button>

    </form>

    <a href="/" class="back-link">
        ← Back to Dashboard
    </a>

</div>

</body>
</html>
